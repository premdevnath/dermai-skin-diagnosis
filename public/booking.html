<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DermAI — Secure Booking</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <style>
    .booking-container { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; margin: 4rem auto; align-items: start; max-width: 1000px; padding: 0 1.5rem; }
    @media (max-width: 768px) { .booking-container { grid-template-columns: 1fr; } }
    .doc-summary { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; text-align: center; }
    .doc-photo { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 2px solid var(--gold); margin: 0 auto 1rem; }
    .doc-fee { font-size: 1.5rem; color: var(--gold); font-weight: bold; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); }
    
    .booking-form { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; }
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.9rem; }
    .form-control { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 0.8rem; border-radius: 8px; font-family: inherit; font-size: 1rem; }
    .form-control:focus { outline: none; border-color: var(--gold); }
    
    .slot-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 0.5rem; margin-top: 0.5rem; }
    .slot-btn { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 0.5rem; border-radius: 6px; cursor: pointer; transition: all 0.2s; text-align: center; font-size: 0.9rem; }
    .slot-btn:hover { border-color: var(--gold); }
    .slot-btn.selected { background: var(--gold); color: #000; border-color: var(--gold); font-weight: bold; }
    
    .btn-pay { display: block; width: 100%; padding: 1.2rem; background: linear-gradient(135deg, #C9A84C, #E5C467); color: #000; font-size: 1.1rem; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: transform 0.3s; margin-top: 2rem; }
    .btn-pay:hover { transform: translateY(-2px); }
    .btn-pay:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    
    .secure-badge { text-align: center; margin-top: 1rem; color: var(--text-muted); font-size: 0.85rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--surface2); color: var(--text); padding: 1rem 2rem; border-radius: 8px; border: 1px solid var(--border); z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

  <header style="padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
    <a href="/" style="font-size:1.5rem; font-weight:bold; color:var(--text);"><span class="gold-text">Derm</span>AI</a>
  </header>

  <div class="booking-container">
    <!-- Left: Doctor Summary -->
    <div class="doc-summary" id="docSummary">
      <div style="color:var(--text-muted);">Loading doctor details...</div>
    </div>

    <!-- Right: Booking Form -->
    <div class="booking-form">
      <h2 style="margin-bottom: 1.5rem; font-size: 1.5rem;">Patient Details</h2>
      
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="pName" class="form-control" required>
      </div>
      
      <div class="form-group" style="display:grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
        <div>
          <label>Phone Number (for WhatsApp)</label>
          <input type="tel" id="pPhone" class="form-control" required>
        </div>
        <div>
          <label>Age</label>
          <input type="number" id="pAge" class="form-control" required>
        </div>
      </div>
      
      <h2 style="margin: 2rem 0 1rem; font-size: 1.5rem;">Select Slot</h2>
      
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="slotDate" class="form-control" required>
      </div>
      
      <div class="form-group">
        <label>Available Times</label>
        <div class="slot-grid" id="slotGrid">
          <div style="color:var(--text-muted); font-size:0.9rem;">Select a date to see slots</div>
        </div>
      </div>
      
      <button class="btn-pay" id="payBtn" onclick="handlePayClick()" disabled>Select a Slot to Pay</button>
      
      <div class="secure-badge">
        <span>🔒 100% Secure Payment powered by Razorpay</span>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/payment.js"></script>
</body>
</html>
