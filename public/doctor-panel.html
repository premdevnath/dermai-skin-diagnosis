<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctor Panel — DermAI</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .panel-container { max-width: 1200px; margin: 2rem auto; padding: 0 1.5rem; display: none; }
    .login-container { max-width: 400px; margin: 10rem auto; background: var(--surface); padding: 2.5rem; border-radius: 16px; border: 1px solid var(--border); }
    .form-control { width: 100%; padding: 0.8rem; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; margin-bottom: 1.2rem; }
    .btn-submit { width: 100%; padding: 0.8rem; background: var(--gold); color: #000; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; }
    
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; }
    .dashboard-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 2rem; align-items: start; }
    @media (max-width: 768px) { .dashboard-grid { grid-template-columns: 1fr; } }
    
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
    .card-header { font-weight: bold; margin-bottom: 1rem; font-size: 1.2rem; color: var(--gold); border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
    
    .appointment-card { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
    .apt-header { display: flex; justify-content: space-between; margin-bottom: 0.5rem; }
    .btn-small { background: var(--surface2); border: 1px solid var(--border); color: var(--gold); padding: 0.4rem 0.8rem; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
    .btn-small:hover { border-color: var(--gold); }
    
    textarea.prescription-box { width: 100%; min-height: 100px; background: var(--surface2); color: var(--text); border: 1px solid var(--border); padding: 0.5rem; border-radius: 4px; font-family: inherit; margin-top: 1rem; resize: vertical; }
  </style>
</head>
<body>

  <!-- Login Section -->
  <div class="login-container" id="loginSection">
    <h2 style="text-align: center; margin-bottom: 1.5rem;" class="gold-text">Doctor Portal</h2>
    <div id="loginError" style="color: var(--red); margin-bottom: 1rem; font-size: 0.9rem;"></div>
    <form id="loginForm">
      <label>Email</label>
      <input type="email" id="email" class="form-control" required>
      <label>Password</label>
      <input type="password" id="password" class="form-control" required>
      <button type="submit" class="btn-submit">Login</button>
    </form>
  </div>

  <!-- Dashboard Section -->
  <div class="panel-container" id="panelSection">
    <div class="top-bar">
      <h2>Welcome, <span class="gold-text" id="docName">Doctor</span></h2>
      <button class="btn-small" onclick="logout()">Logout</button>
    </div>
    
    <div class="dashboard-grid">
      <!-- Appointments List -->
      <div>
        <div class="card">
          <div class="card-header">Upcoming Appointments</div>
          <div id="appointmentsList">
            <div style="color:var(--text-muted);">Loading appointments...</div>
          </div>
        </div>
      </div>
      
      <!-- Slot Management -->
      <div>
        <div class="card">
          <div class="card-header">Add Time Slots</div>
          <form id="addSlotsForm">
            <label style="font-size:0.9rem; margin-bottom:0.25rem; display:block;">Select Date</label>
            <input type="date" id="newSlotDate" class="form-control" required>
            
            <label style="font-size:0.9rem; margin-bottom:0.25rem; display:block;">Times (comma separated, e.g. 10:00 AM, 10:30 AM)</label>
            <input type="text" id="newSlotTimes" class="form-control" placeholder="10:00 AM, 10:15 AM..." required>
            
            <button type="submit" class="btn-small" style="width:100%; padding:0.6rem; background:var(--gold); color:#000;">Add Slots</button>
            <div id="slotMsg" style="margin-top:0.5rem; font-size:0.85rem;"></div>
          </form>
        </div>
        
        <div class="card">
          <div class="card-header">Your Available Slots</div>
          <div id="availableSlotsList" style="font-size:0.9rem;">
            Loading...
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/doctor-panel.js"></script>
</body>
</html>
