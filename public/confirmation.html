<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DermAI — Booking Confirmed</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .confirm-container { max-width: 600px; margin: 4rem auto; text-align: center; padding: 2rem; }
    .success-icon { font-size: 5rem; color: var(--green); margin-bottom: 1rem; }
    .confirm-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; margin: 2rem 0; text-align: left; }
    .detail-row { display: flex; justify-content: space-between; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--surface2); }
    .detail-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .detail-label { color: var(--text-muted); }
    .detail-value { font-weight: bold; color: var(--text); text-align: right; }
    
    .btn-group { display: flex; flex-direction: column; gap: 1rem; }
    .btn-primary { background: var(--gold); color: #000; padding: 1rem; border-radius: 8px; font-weight: bold; border: none; cursor: pointer; text-align: center; }
    .btn-outline { background: transparent; color: var(--gold); padding: 1rem; border-radius: 8px; font-weight: bold; border: 1px solid var(--gold); cursor: pointer; text-align: center; }
  </style>
</head>
<body>

  <header style="padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
    <a href="/" style="font-size:1.5rem; font-weight:bold; color:var(--text);"><span class="gold-text">Derm</span>AI</a>
  </header>

  <div class="confirm-container">
    <div class="success-icon">✅</div>
    <h1 style="margin-bottom: 0.5rem;">Booking Confirmed!</h1>
    <p style="color: var(--text-muted);">Your consultation slot has been successfully booked.</p>

    <div class="confirm-card" id="bookingCard">
      <!-- Injected by JS -->
      <div style="text-align:center;color:var(--text-muted);">Loading booking details...</div>
    </div>
    
    <div style="background: rgba(201,168,76,0.1); border-left: 4px solid var(--gold); padding: 1rem; text-align: left; margin-bottom: 2rem; border-radius: 4px;">
      <p style="font-size: 0.9rem; color: var(--text-muted);"><strong>Note:</strong> Your doctor will join at the scheduled time via WhatsApp Video Call or Phone Call.</p>
    </div>

    <div class="btn-group" id="btnGroup">
      <a href="#" class="btn-primary" onclick="window.print()">📥 Download Confirmation</a>
      <a href="/result.html" class="btn-outline">📋 View AI Report</a>
      <a href="/doctors.html" class="btn-outline">🔁 Book Another Consultation</a>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const raw = sessionStorage.getItem('dermaiBooking');
      if (!raw) {
        window.location.href = '/';
        return;
      }
      
      try {
        const b = JSON.parse(raw);
        
        // Format date/time
        let dateTimeStr = 'N/A';
        if (b.time_slots) {
          const d = new Date(b.time_slots.slot_date);
          dateTimeStr = `${d.toLocaleDateString('en-IN', {day:'numeric',month:'short',year:'numeric'})}, ${b.time_slots.slot_time}`;
        }
        
        document.getElementById('bookingCard').innerHTML = `
          <div class="detail-row">
            <span class="detail-label">Booking ID</span>
            <span class="detail-value">#${b.id.split('-')[0].toUpperCase()}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Doctor</span>
            <span class="detail-value">Dr. ${b.doctors ? b.doctors.name : 'Unknown'}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Date & Time</span>
            <span class="detail-value">${dateTimeStr}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Amount Paid</span>
            <span class="detail-value">₹${b.consultation_fee} ✓</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Payment ID</span>
            <span class="detail-value" style="font-size:0.85rem;">${b.razorpay_payment_id || 'N/A'}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Status</span>
            <span class="detail-value" style="color:var(--green);">CONFIRMED</span>
          </div>
        `;
        
      } catch(e) {
        document.getElementById('bookingCard').innerHTML = `<div style="color:var(--red);">Failed to load details.</div>`;
      }
    });
  </script>
</body>
</html>
